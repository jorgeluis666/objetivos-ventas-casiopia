name: Actualizar datos de ventas

on:
  schedule:
    # Lunes 11:00 hora Lima (UTC-5) = 16:00 UTC
    - cron: '0 16 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write service account credentials
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$SERVICE_ACCOUNT_JSON" > credentials/service-account.json

      - name: Fetch data from Google Sheets
        run: node scripts/fetch-data.js

      - name: Remove credentials (safety)
        if: always()
        run: rm -f credentials/service-account.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ventas-2026.json
          if git diff --cached --quiet; then
            echo "Sin cambios en data/ventas-2026.json"
            exit 0
          fi
          TODAY=$(TZ='America/Lima' date +'%Y-%m-%d')
          git commit -m "data: actualización semanal ${TODAY}"
          git push
