name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  # Redeploy automático cuando el pipeline de datos commitea nueva data.
  # Por defecto, los pushes del GITHUB_TOKEN no encadenan workflows, así que
  # usamos workflow_run para disparar este deploy después de un fetch exitoso.
  workflow_run:
    workflows: ["Actualizar datos de ventas"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    # Si vino por workflow_run, correr solo si el upstream pasó en verde
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
